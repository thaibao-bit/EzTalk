# Production-oriented PostgreSQL baseline for a medium container.
# Tune these values with real memory/CPU limits before heavy traffic.

listen_addresses = '*'
max_connections = 200

shared_buffers = 512MB
effective_cache_size = 1536MB
work_mem = 16MB
maintenance_work_mem = 128MB

wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB

random_page_cost = 1.1
effective_io_concurrency = 200

log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
