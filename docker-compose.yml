services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/thaibao-bit/eztalk:local
    ports:
      # FastAPI is exposed on host port 8080; host port 8000 remains available
      # for a local vLLM OpenAI-compatible server.
      - "8080:8000"
    environment:
      # From inside Docker, host.docker.internal:8000 points to vLLM on the host.
      VLLM_BASE_URL: "http://host.docker.internal:8000/v1"
      VLLM_MODEL: "${VLLM_MODEL:-default}"
      VLLM_API_KEY: "${VLLM_API_KEY:-}"
      DATABASE_URL: "sqlite+aiosqlite:///./data/eztalk.db"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
